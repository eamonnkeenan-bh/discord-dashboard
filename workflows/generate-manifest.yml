name: Generate data manifest

on:
  push:
    paths:
      - "data/**.csv"
    branches:
      - main

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate manifest.json from data/*.csv
        run: |
          cd data
          {
            printf '[\n'
            first=1
            for f in *.csv; do
              if [ "$first" -eq 1 ]; then
                first=0
              else
                printf ',\n'
              fi
              printf '  "%s"' "$f"
            done
            printf '\n]\n'
          } > manifest.json

      - name: Commit and push manifest.json if changed
        run: |
          git config user.name "manifest-bot"
          git config user.email "actions@github.com"
          git add data/manifest.json
          if git diff --cached --quiet; then
            echo "No changes to manifest.json"
          else
            git commit -m "Auto-update data/manifest.json"
            git push
          fi
